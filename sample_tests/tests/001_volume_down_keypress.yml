name: volume_down_keypress

from: base

steps:
  - sleep: 2s
  - invoke_key: volumedown
  - wait:
      timeout: 10s
  - screenshot:
      name: volume_down_keypress
      regions:
        - [100,100,400,200]
        - x: 10
          y: 10
          width: 10
          height: 10
        - [600,200,200,100]
